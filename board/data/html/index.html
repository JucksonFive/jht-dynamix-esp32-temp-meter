<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WiFi Setup - JT-DYNAMIX</title>
  <link href="style.css" rel="stylesheet" />
</head>

<body>
  <div class="container">
    <div class="header">
      <img src="globe.svg" alt="Globe Logo" class="logo" />
    </div>
    <h1>Device Configuration</h1>

    <!-- WiFi Configuration -->
    <form id="setupForm">
      <!-- Step 1: WiFi -->
      <div class="step" id="step-1">
        <h2>1. WiFi Settings</h2>
        <input type="text" name="ssid" placeholder="WiFi SSID" required />
        <input type="password" name="password" placeholder="WiFi Password" required />
        <button type="button" onclick="nextStep()">Next</button>
      </div>

      <!-- Step 2: Login -->
      <div class="step hidden" id="step-2">
        <h2>2. JT-Credentials</h2>
        <input type="text" name="username" placeholder="Username" required />
        <input type="password" name="userPassword" placeholder="Password" required />
        <div class="button-group">
          <button type="button" onclick="prevStep()">Back</button>
          <button type="button" onclick="nextStep()">Next</button>
        </div>
      </div>

      <!-- Step 3: Confirm & Submit -->
      <div class="step hidden" id="step-3">
        <h2>3. Confirm Settings</h2>
        <pre id="summaryBox"></pre>
        <div class="button-group">
          <button type="button" onclick="prevStep()">Back</button>
          <button type="submit">Save Configuration</button>
        </div>
      </div>
    </form>
    <footer class="footer">
      <p>JT-Dynamix &copy; 2025</p>
    </footer>
    <script>
      let currentStep = 1;

      function showStep(step) {
        document.querySelectorAll(".step").forEach((el, index) => {
          el.classList.toggle("hidden", index !== step - 1);
        });

        if (step === 3) {
          const form = document.getElementById("setupForm");
          const formData = new FormData(form);
          const summary = [...formData.entries()]
            .map(([k, v]) => `${k}: ${v}`)
            .join("\n");
          document.getElementById("summaryBox").textContent = summary;
        }
      }

      function nextStep() {
        if (currentStep < 3) {
          currentStep++;
          showStep(currentStep);
        }
      }

      function prevStep() {
        if (currentStep > 1) {
          currentStep--;
          showStep(currentStep);
        }
      }

      document.addEventListener("DOMContentLoaded", () => showStep(currentStep));
      const form = document.querySelector("form");
      const button = form.querySelector("button[type='submit']");
      const spinner = document.createElement("div");
      const statusText = document.createElement("p");
      const continueButton = document.createElement("button");

      // Spinner setup
      spinner.className = "spinner hidden"; // sinun .spinner-tyyli
      spinner.innerText = "Connecting...";
      statusText.className = "status hidden"; // tyylitä värit (esim. .error/.success)

      // Continue button setup
      continueButton.innerText = "Continue";
      continueButton.className = "hidden continue-btn";
      continueButton.addEventListener("click", () => {
        // Siirrytään seuraavaan vaiheeseen
        window.location.href = "/next-step"; // tai muuta logiikka
      });

      form.appendChild(spinner);
      form.appendChild(statusText);
      form.appendChild(continueButton);

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        button.disabled = true;
        spinner.classList.remove("hidden");
        statusText.classList.add("hidden");
        continueButton.classList.add("hidden");

        try {
          const formData = new FormData(form);
          const res = await fetch("/submit", {
            method: "POST",
            body: formData,
          });

          spinner.classList.add("hidden");

          if (res.ok) {
            statusText.innerText = "✅ Device connected to WiFi!";
            statusText.className = "status success";
            continueButton.classList.remove("hidden");
          } else {
            statusText.innerText = "❌ Failed to connect. Please check credentials.";
            statusText.className = "status error";
            button.disabled = false;
          }
        } catch (err) {
          spinner.classList.add("hidden");
          statusText.innerText = "❌ Unexpected error. Try again.";
          statusText.className = "status error";
          button.disabled = false;
        }

        statusText.classList.remove("hidden");
      });
    </script>

  </div>
</body>

</html>
