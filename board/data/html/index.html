<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WiFi Setup - JT-DYNAMIX</title>
  <link href="style.css" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>

<body>
  <div class="container">
    <div class="header">
      <img src="globe.svg" alt="Globe Logo" class="logo" />
    </div>
    <h1>Device Configuration</h1>

    <!-- WiFi Configuration -->
    <form id="setupForm">
      <!-- Step 1: WiFi -->
      <div class="step" id="step-1">
        <h2>1. WiFi Settings</h2>
        <input type="text" name="ssid" placeholder="WiFi SSID" required />
        <input type="password" name="password" placeholder="WiFi Password" required />
        <button type="button" onclick="handleWifiSubmit()">Connect</button>
        <div id="wifi-feedback">
          <div id="wifi-spinner" class="spinner hidden">
            <img src="favicon.svg" alt="Loading" class="spinner-icon" />
            <span>Connecting...</span>
          </div>
          <p id="wifi-status" class="status hidden"></p>
        </div>
      </div>

      <!-- Step 2: Login -->
      <div class="step hidden" id="step-2">
        <h2>2. JT-Credentials</h2>
        <input type="text" name="username" placeholder="Username" required />
        <input type="password" name="userPassword" placeholder="Password" required />
        <div class="button-group">
          <button type="button" onclick="prevStep()">Back</button>
          <button type="button" onclick="nextStep()">Next</button>
        </div>
      </div>

      <!-- Step 3: Confirm & Submit -->
      <div class="step hidden" id="step-3">
        <h2>3. Confirm Settings</h2>
        <pre id="summaryBox"></pre>
        <div class="button-group">
          <button type="button" onclick="prevStep()">Back</button>
          <button type="submit">Save Configuration</button>
        </div>
      </div>
    </form>
    <footer class="footer">
      <p>JT-Dynamix &copy; 2025</p>
    </footer>
  </div>
  <script src="wizard.js"></script>
</body>

</html>
