name: Dashboard Test Coverage

on:
  pull_request:
    paths:
      - 'dashboard/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Run dashboard tests (coverage)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: Run tests (coverage)
        working-directory: dashboard
        run: npm run test
