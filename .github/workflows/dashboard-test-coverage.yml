name: Dashboard Test Coverage

on:
  pull_request:
    paths:
      - 'dashboard/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Run dashboard tests (coverage)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests (coverage)
        working-directory: dashboard
        run: pnpm run test
