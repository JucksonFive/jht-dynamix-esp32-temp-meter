# Fast security checks on every PR
# Gitleaks (secret detection) + OSV-Scanner (vulnerability check)
name: PR Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Gitleaks – detect leaked secrets ────────────────────
  gitleaks:
    name: Gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── OSV-Scanner – known vulnerability check ────────────
  osv-scanner:
    name: OSV-Scanner (vuln check)
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@v2.3.3
    permissions:
      actions: read
      contents: read
      security-events: write